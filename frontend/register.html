<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container" style="max-width: 400px;">
    <h2>Student Registration</h2>
    <form id="registerForm">
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" required pattern="[A-Za-z ]+" title="Only alphabets allowed">
            <small id="nameError" style="color: red; display: none; margin-top: 5px;">Name can only contain alphabets and spaces.</small>
        </div>
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" required>
            <small id="emailError" style="color: red; display: none; margin-top: 5px;">Please enter a valid email address.</small>
        </div>
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" required minlength="6">
            <small id="passwordError" style="color: red; display: none; margin-top: 5px;">Password must be at least 6 characters.</small>
        </div>
        <button type="submit" id="registerBtn" class="primary-btn">Register</button>
    </form>
    <p id="message"></p>
    <p style="text-align: center;">Already have an account? <a href="login.html">Login here</a></p>
</div>

<script src="js/register.js"></script>

</body>
</html>
